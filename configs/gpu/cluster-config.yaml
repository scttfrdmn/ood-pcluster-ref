Region: us-east-1
Image:
  Os: alinux2023
HeadNode:
  InstanceType: t3.medium
  Networking:
    SubnetId: subnet-xxxxxxxxxxxxxxxxx
  Iam:
    AdditionalIamPolicies:
      - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
  CustomActions:
    OnNodeConfigured:
      Script: s3://YOUR_BUCKET/scripts/setup-head-node.sh

Scheduling:
  Scheduler: slurm
  SlurmQueues:
    - Name: cpu
      CapacityType: ONDEMAND
      Networking:
        SubnetIds:
          - subnet-xxxxxxxxxxxxxxxxx
      ComputeResources:
        - Name: c5-xlarge
          InstanceType: c5.xlarge
          MinCount: 0
          MaxCount: 20

    - Name: gpu
      CapacityType: SPOT
      Networking:
        SubnetIds:
          - subnet-xxxxxxxxxxxxxxxxx
      ComputeResources:
        - Name: g4dn-xlarge
          InstanceType: g4dn.xlarge
          MinCount: 0
          MaxCount: 8
        - Name: p3-2xlarge
          InstanceType: p3.2xlarge
          MinCount: 0
          MaxCount: 4

SharedStorage:
  - MountDir: /home
    Name: home-efs
    StorageType: Efs
    EfsSettings:
      FileSystemId: fs-xxxxxxxxxxxxxxxxx
  - MountDir: /scratch
    Name: scratch-fsx
    StorageType: FsxLustre
    FsxLustreSettings:
      StorageCapacity: 1200
      DeploymentType: SCRATCH_2
